services:
  # PostgreSQL（方案 A：一个 PG 实例两个 database）
  # - auto_wechat：9000 主库（POSTGRES_DB 自动建）
  # - xg_douyin_ai_cs：9100 RAG metadata 库（init-prod/010 首次启动建，幂等）
  # 启动前必须准备 .env.production.local 或通过 --env-file 显式传入生产配置。
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-auto_wechat}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB:-auto_wechat}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init-prod:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-auto_wechat} -d ${PG_DB:-auto_wechat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  auto-wechat-api:
    image: xg-ai-system-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: xg-auto-wechat-api
    working_dir: /workspace
    env_file:
      - path: .env.production.local
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://${PG_USER:-auto_wechat}:${PG_PASSWORD}@postgres:5432/${PG_DB:-auto_wechat}
      XG_DOUYIN_AI_CS_BASE_URL: http://xg-douyin-ai-cs:9100
      AUTO_WECHAT_9000_BASE_URL: http://auto-wechat-api:9000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - ./docker-data/auto_wechat_9000:/workspace/data
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9000"]
    restart: unless-stopped
    healthcheck:
      # P3-PGSQL-PRECUTOVER-REMEDIATION-1 / A1：用 /ready 替代 /docs
      # /ready 验证 PG 连通 + database 名 + alembic head + 关键表，任一失败返回 503 → unhealthy
      # 前提：部署前必须先执行 alembic upgrade head，否则 alembic_revision 检查失败导致 unhealthy
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  xg-douyin-ai-cs:
    image: xg-ai-system-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: xg-douyin-ai-cs
    working_dir: /workspace
    env_file:
      - path: .env.production.local
        required: false
    environment:
      RAG_DATABASE_URL: postgresql+psycopg://${PG_USER:-auto_wechat}:${PG_PASSWORD}@postgres:5432/xg_douyin_ai_cs
      AUTO_WECHAT_9000_BASE_URL: http://auto-wechat-api:9000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - ./docker-data/xg_douyin_ai_cs:/data
    command: ["python", "-m", "uvicorn", "apps.xg_douyin_ai_cs.main:app", "--host", "0.0.0.0", "--port", "9100"]
    restart: unless-stopped
    healthcheck:
      # P3-PGSQL-PRECUTOVER-REMEDIATION-1 / A1：用 /ready 替代 /health（liveness）
      # /ready 验证 RAG PG 连通 + database 名 + alembic head + 关键表，不调用 SQLite fallback
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  auto-wechat-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: xg-auto-wechat-frontend
    working_dir: /workspace/frontend
    env_file:
      - path: .env.production.local
        required: false
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_AUTO_WECHAT_API_BASE_URL: ${VITE_AUTO_WECHAT_API_BASE_URL:-/api}
      VITE_DOUYIN_AI_CS_API_BASE_URL: ${VITE_DOUYIN_AI_CS_API_BASE_URL:-/ai-cs-api}
      VITE_NEWCAR_AUTH_BASE_URL: ${VITE_NEWCAR_AUTH_BASE_URL:-}
      VITE_NEWCAR_LOGIN_URL: ${VITE_NEWCAR_LOGIN_URL:-}
      VITE_DEV_API_PROXY_TARGET: ${VITE_DEV_API_PROXY_TARGET:-http://auto-wechat-api:9000}
      VITE_DEV_DOUYIN_AI_CS_PROXY_TARGET: ${VITE_DEV_DOUYIN_AI_CS_PROXY_TARGET:-http://xg-douyin-ai-cs:9100}
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/workspace/frontend
      - /workspace/frontend/node_modules
    command: ["sh", "-c", "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
